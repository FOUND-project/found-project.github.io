<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" fill="none">
  <defs>
    <linearGradient id="midFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000" stop-opacity="1"/>
      <stop offset="0.50" stop-color="#000" stop-opacity="1"/>
      <stop offset="1" stop-color="#000" stop-opacity="1"/>
    </linearGradient>

    <filter id="soften" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.28"/>
    </filter>

    <linearGradient id="rootsToCircuits" x1="0" y1="0" x2="1600" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1e4034" stop-opacity="0.26"/>
      <stop offset="0.52" stop-color="#4a8c73" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#d4af37" stop-opacity="0.18"/>
    </linearGradient>

    <mask id="maskAll">
      <rect width="1600" height="900" fill="url(#midFade)"/>
    </mask>

    <linearGradient id="leftFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#000" stop-opacity="1"/>
      <stop offset="0.70" stop-color="#000" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.05"/>
    </linearGradient>

    <linearGradient id="rightFade" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#000" stop-opacity="1"/>
      <stop offset="0.70" stop-color="#000" stop-opacity="0.75"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.05"/>
    </linearGradient>

    <mask id="maskLeft">
      <rect width="1600" height="900" fill="url(#leftFade)"/>
    </mask>

    <mask id="maskRight">
      <rect width="1600" height="900" fill="url(#rightFade)"/>
    </mask>
  </defs>

  <!-- ROOTS (left) -->
  <g mask="url(#maskLeft)" filter="url(#soften)" stroke="url(#rootsToCircuits)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M180 40 C220 140, 240 220, 270 320 C310 460, 290 560, 250 650 C220 720, 200 780, 215 860"/>
    <path d="M270 320 C220 330, 180 360, 130 410"/>
    <path d="M285 350 C235 390, 210 430, 195 490"/>
    <path d="M260 520 C210 540, 170 575, 145 640"/>
    <path d="M240 650 C200 680, 175 720, 160 780"/>

    <path d="M360 70 C390 170, 410 240, 430 330 C455 440, 455 520, 430 610 C400 720, 410 790, 455 860"/>
    <path d="M430 330 C380 335, 340 355, 300 395"/>
    <path d="M440 410 C390 445, 360 490, 345 555"/>
    <path d="M430 610 C380 625, 350 660, 335 715"/>

    <path d="M130 410 C110 440, 95 470, 80 515"/>
    <path d="M195 490 C170 525, 155 565, 140 605"/>
    <path d="M145 640 C125 680, 115 710, 110 750"/>
    <path d="M300 395 C270 425, 245 455, 220 500"/>
    <path d="M345 555 C320 585, 300 620, 285 670"/>
    <path d="M335 715 C315 750, 310 785, 305 820"/>
  </g>

  <!-- “TRANSITION” THREADS (centre) -->
  <g filter="url(#soften)" stroke="#4a8c73" stroke-opacity="0.20" stroke-width="1.8" stroke-linecap="round">
    <path d="M620 210 C720 210, 760 210, 860 210"/>
    <path d="M600 360 C710 390, 760 410, 900 420"/>
    <path d="M610 540 C720 520, 780 500, 940 470"/>
    <path d="M650 700 C760 680, 840 660, 980 640"/>
  </g>

  <!-- CIRCUITS (right) -->
  <g mask="url(#maskRight)" filter="url(#soften)" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#4a8c73" stroke-opacity="0.20" stroke-width="2">
      <path d="M980 110 H1500"/>
      <path d="M980 230 H1500"/>
      <path d="M980 350 H1500"/>
      <path d="M980 470 H1500"/>
      <path d="M980 590 H1500"/>
      <path d="M980 710 H1500"/>
      <path d="M980 830 H1500"/>

      <path d="M1050 60 V880"/>
      <path d="M1180 60 V880"/>
      <path d="M1310 60 V880"/>
      <path d="M1440 60 V880"/>
    </g>

    <g stroke="#d4af37" stroke-opacity="0.18" stroke-width="2.2">
      <path d="M1060 170 H1210 V270 H1380"/>
      <path d="M1120 420 H1260 V520 H1420"/>
      <path d="M1040 680 H1160 V760 H1360 V820 H1500"/>
    </g>

    <g fill="#4a8c73" fill-opacity="0.18" stroke="#4a8c73" stroke-opacity="0.22">
      <circle cx="1210" cy="170" r="6"/>
      <circle cx="1210" cy="270" r="6"/>
      <circle cx="1380" cy="270" r="7"/>
      <circle cx="1260" cy="420" r="6"/>
      <circle cx="1260" cy="520" r="6"/>
      <circle cx="1420" cy="520" r="7"/>
      <circle cx="1160" cy="680" r="6"/>
      <circle cx="1160" cy="760" r="6"/>
      <circle cx="1360" cy="760" r="6"/>
      <circle cx="1360" cy="820" r="6"/>
      <circle cx="1500" cy="820" r="7"/>
    </g>
  </g>
</svg>
